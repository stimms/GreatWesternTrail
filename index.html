<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Great Western Trail Scorer</title>
    <meta name="theme-color" content="#7b5135" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GWT Scorer" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <main class="app-shell">
      <section class="masthead" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Trail-end scoring</p>
          <h1 id="app-title">Great Western Trail Scorer</h1>
        </div>
        <button class="ghost-button" id="reset-app" type="button">Reset</button>
      </section>

      <section class="panel setup-panel" id="setup-panel" aria-labelledby="setup-title">
        <div class="panel-heading">
          <h2 id="setup-title">Players</h2>
          <p>Add 1 to 4 cattle drivers.</p>
        </div>

        <form id="player-form" class="player-form">
          <div class="player-grid" id="player-inputs"></div>
          <button class="primary-button" type="submit">Start scoring</button>
        </form>
      </section>

      <section class="scoreboard hidden" id="scoreboard" aria-label="Final score sheet">
        <div class="scoreboard-header">
          <button class="secondary-button" id="edit-players" type="button">Edit players</button>
        </div>

        <div class="score-table-wrap">
          <table class="score-table">
            <thead id="score-head"></thead>
            <tbody id="score-body"></tbody>
            <tfoot id="score-foot"></tfoot>
          </table>
        </div>

        <div class="score-actions">
          <button class="primary-button" id="record-game" type="button">Record game</button>
        </div>
      </section>

      <section class="panel history-panel" aria-labelledby="history-title">
        <div class="panel-heading history-heading">
          <div>
            <p class="eyebrow">Past games</p>
            <h2 id="history-title">Game history</h2>
          </div>
          <button class="secondary-button" id="clear-history" type="button">Clear history</button>
        </div>

        <div class="history-list" id="history-list"></div>
      </section>

      <aside class="install-prompt hidden" id="install-prompt" aria-label="Install app">
        <img src="assets/icon-192.png" alt="" />
        <div>
          <strong>Install the scorer</strong>
          <span id="install-message">Keep it on your home screen for game night.</span>
        </div>
        <button class="primary-button" id="install-app" type="button">Install</button>
        <button class="icon-button" id="dismiss-install" type="button" aria-label="Dismiss install prompt">X</button>
      </aside>
    </main>

    <script src="app.js?v=3"></script>
  </body>
</html>
